# Netlify config — chỉ deploy static site (plan + prototype + timeline)
# Không touch vào backend/ và frontend/ (đó là code project thực, deploy riêng)

[build]
  publish = "."
  command = ""
  # Tắt auto-detect framework
  ignore = "/bin/false"

[build.environment]
  # Không cần Node build
  NODE_VERSION = "18"

# Ignore backend/ + frontend/ khỏi static deploy
[[redirects]]
  from = "/backend/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/frontend/*"
  to = "/404.html"
  status = 404
